{% extends 'base.html' %}
{% block title %}404 - Page Not Found{% endblock %}
{% block content %}
<div class="row min-vh-100 align-items-center justify-content-center text-center">
    <div class="col-md-6">
        <h1 class="display-1 text-primary">404</h1>
        <h2 class="mb-4">Oops! Page Not Found</h2>
        <p class="text-muted mb-4">The page you are looking for might have been removed, had its name changed, or is
            temporarily unavailable.</p>
        <a href="{{ url_for('public.index') }}" class="btn btn-primary px-4 py-2">
            <i class="fas fa-home me-2"></i>Return to Home
        </a>
    </div>
</div>
{% endblock %}
