{% extends "base.html" %}

{% block title %}Login - Academia{% endblock %}

{% block header_title %}Login{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto; text-align: center;">
    <h2>Sign In to Your Portal</h2>
    <p>Select your role and enter your credentials.</p>
    <br>
    <form action="#" method="POST" style="display: flex; flex-direction: column; gap: 16px;">
        <input type="text" placeholder="Username / ID" class="search-bar" style="width: 100%;">
        <input type="password" placeholder="Password" class="search-bar" style="width: 100%;">
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
    </form>
</div>
{% endblock %}
