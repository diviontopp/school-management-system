<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DBX Egmore{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Base CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    {% block extra_css %}{% endblock %}
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon"></div>
                <span>Academia</span>
            </div>

            <nav class="nav-links">
                {% block sidebar_links %}
                <!-- Default sidebar items, overridden by specific portals -->
                <a href="/" class="nav-item">🏠 Home</a>
                <a href="/login" class="nav-item">🔑 Login</a>
                {% endblock %}
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="header-title" style="display: flex; align-items: center; gap: 1rem;">
                    <button class="sidebar-toggle" aria-label="Toggle Sidebar" style="display: none; background: none; border: none; cursor: pointer; padding: 0.5rem; color: var(--text-primary);">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    {% block header_title %}Welcome{% endblock %}
                </div>

                <div class="header-actions">
                    <input type="text" class="search-bar" placeholder="Search...">
                    <div class="user-profile">
                        <div class="avatar"></div>
                        <span>Guest</span>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <main class="content-area">
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>

    <div class="sidebar-overlay"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.querySelector('.sidebar');
            const sidebarToggle = document.querySelector('.sidebar-toggle');
            const overlay = document.querySelector('.sidebar-overlay');

            if (sidebarToggle && sidebar && overlay) {
                const closeSidebar = () => {
                    sidebar.classList.remove('active');
                    overlay.classList.remove('active');
                };

                sidebarToggle.addEventListener('click', () => {
                    sidebar.classList.add('active');
                    overlay.classList.add('active');
                });

                overlay.addEventListener('click', closeSidebar);
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
